name: LinkDive
options:
  bundleIdPrefix: com.yourcompany
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.0.0
targets:
  LinkDive:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: LinkDive
      - path: LinkDiveExtension/ShareViewController.swift
        type: file
        optional: true
    info:
      path: LinkDive/Info.plist
      properties:
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: "" # Set your Apple Developer Team ID here
      PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.LinkDive
    dependencies:
      - package: GoogleMobileAds
      - target: LinkDiveExtension
        embed: true
  LinkDiveExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: LinkDiveExtension
        excludes:
          - Info.plist
      - path: LinkDive/LinkDiveParser.swift
        type: file
    info:
      path: LinkDiveExtension/Info.plist
      properties:
        CFBundleDisplayName: $(PRODUCT_NAME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule: >
              SUBQUERY (
                  extensionItems,
                  $extensionItem,
                  SUBQUERY (
                      $extensionItem.attachments,
                      $attachment,
                      ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.url" OR
                      ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.plain-text"
                  ).@count > 0
              ).@count > 0
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: "" # Set your Apple Developer Team ID here
      PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.LinkDive.LinkDiveExtension
      SKIP_INSTALL: YES
      GENERATE_INFOPLIST_FILE: NO
schemes:
  LinkDiveApp:
    build:
      targets:
        LinkDive: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
